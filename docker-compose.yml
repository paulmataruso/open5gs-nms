services:
  nginx:
    image: nginx:alpine
    container_name: open5gs-nms-nginx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/nms.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,container"
    labels:
      com.open5gs.nms.service: "nginx"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: open5gs-nms-backend
    restart: unless-stopped
    privileged: true
    pid: host
    network_mode: host
    volumes:
      - /etc/open5gs:/etc/open5gs
      - /var/log/open5gs:/var/log/open5gs
      - /run/systemd/system:/run/systemd/system:ro
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
      - /usr/bin/systemctl:/usr/bin/systemctl:ro
      - /bin/systemctl:/bin/systemctl:ro
      - /lib/systemd:/lib/systemd:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - ./logs:/var/log/open5gs-nms
      - ./data:/app/data
      - /etc/open5gs/backups/config:/etc/open5gs/backups/config
      - /etc/open5gs/backups/mongodb:/etc/open5gs/backups/mongodb
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://127.0.0.1:27017/open5gs
      - CONFIG_PATH=/etc/open5gs
      - BACKUP_PATH=/etc/open5gs/backups/config
      - MONGO_BACKUP_PATH=/etc/open5gs/backups/mongodb
      - LOG_LEVEL=info
      - WS_PORT=3002
      - HOST_SYSTEMCTL_PATH=/usr/bin/systemctl
      # Auth
      - AUTH_DB_PATH=/app/data/auth.db
      - SESSION_MAX_AGE=86400
      - FIRST_RUN_PASSWORD=${FIRST_RUN_PASSWORD:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/api/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,container"
    labels:
      com.open5gs.nms.service: "backend"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
      args:
        - VITE_API_URL=
        - VITE_WS_URL=
    container_name: open5gs-nms-frontend
    restart: unless-stopped
    network_mode: host
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,container"
    labels:
      com.open5gs.nms.service: "frontend"
