# Grafana configuration for Open5GS NMS deployment
# Overrides select defaults — everything else uses Grafana's built-in defaults.

[server]
http_port = 3000
# Bind to all interfaces (host network mode)
http_addr =
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[security]
# Change admin password via environment variable GF_SECURITY_ADMIN_PASSWORD
# or through the Grafana UI after first login.
admin_user = admin
# Default is 'admin' — override with GF_SECURITY_ADMIN_PASSWORD env var
# in docker-compose.yml or .env file.
disable_gravatar = true

[users]
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_role = Viewer

[auth.anonymous]
# Set to true to allow unauthenticated read-only access.
# Useful if Grafana is only accessible from your internal network.
enabled = false

[dashboards]
default_home_dashboard_path =

[alerting]
enabled = false

[unified_alerting]
enabled = false

[analytics]
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false

[log]
mode = console
level = warn

[paths]
provisioning = /etc/grafana/provisioning
