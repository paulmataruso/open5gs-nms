upstream backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

# WebSocket now runs on the same port as the HTTP backend (3001).
# Authentication is enforced server-side on the upgrade request.
# The separate port 3002 is no longer used.
upstream websocket {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream frontend {
    server 127.0.0.1:8081;
    keepalive 32;
}

# SAS access log format — captures CBSD IP, method, path, status, body size, response time
log_format sas_log '$time_iso8601 | $remote_addr | $request_method $request_uri | '
                   'HTTP $status | ${body_bytes_sent}b | ${request_time}s | '
                   '$http_user_agent';

# ── HTTP server (NMS web UI + SAS HTTP fallback) ──────────────────────────────
server {
    listen 80;
    listen 8888;
    server_name _;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    proxy_connect_timeout       60s;
    proxy_send_timeout          120s;
    proxy_read_timeout          120s;

    location /ws {
        proxy_pass http://websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/femto/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     700s;
        proxy_send_timeout     700s;
        client_max_body_size 1m;
    }

    location /sas/ {
        proxy_pass http://backend/sas/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 1m;
        access_log /var/log/nginx/sas-access.log sas_log;
    }

    # FRR source builds (fresh install via the migration wizard, or the standalone
    # "Reinstall (Source)" tool) can run for many minutes — the default 120s proxy
    # timeouts below would otherwise cut the streamed response mid-build even though the
    # underlying host build (spawned via nsenter) keeps running regardless.
    location ~ ^/api/frr/(migration/install-frr|source-build) {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering        off;
        proxy_read_timeout     1800s;
        proxy_send_timeout     1800s;
        client_max_body_size 10m;
    }

    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
    }

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ── HTTPS CWMP proxy for Sercomm factory-default ACS URL ─────────────────────
# Port 443 — factory-reset Sercomm radios connect to https://acs.sc.sercomm.com
# DNS hijack points acs.sc.sercomm.com to this host; TLS terminates here,
# CWMP traffic is forwarded to GenieACS on port 7547 (plain HTTP).
server {
    listen 443 ssl;
    server_name acs.sc.sercomm.com;

    ssl_certificate     /etc/nginx/certs/acs.crt;
    ssl_certificate_key /etc/nginx/certs/acs.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:ACS:10m;
    ssl_session_timeout 10m;

    access_log /var/log/nginx/acs-access.log;
    error_log  /var/log/nginx/error.log warn;

    location / {
        proxy_pass http://127.0.0.1:7547;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        client_max_body_size  10m;
    }
}

# ── HTTPS server (SAS endpoint for Sercomm and other radios requiring TLS) ────
# Port 8443 — radios that require HTTPS point here
# TLS is terminated by nginx; backend stays plain HTTP
server {
    listen 8443 ssl;
    server_name _;

    # Self-signed cert generated by setup-sas-cert.sh
    # If certs don't exist nginx will fail to start — run the script first
    ssl_certificate     /etc/nginx/certs/sas.crt;
    ssl_certificate_key /etc/nginx/certs/sas.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    proxy_connect_timeout  60s;
    proxy_send_timeout     120s;
    proxy_read_timeout     120s;

    # SAS CBSD endpoints — same as HTTP but over TLS
    location /sas/ {
        proxy_pass http://backend/sas/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        client_max_body_size 1m;
        access_log /var/log/nginx/sas-access.log sas_log;
    }

    # Serve the SAS cert for download — radios can pull and trust it
    location /sas-cert/ {
        alias /etc/nginx/certs/;
        add_header Content-Disposition 'attachment';
        access_log off;
    }

    # Block everything else on the HTTPS port
    location / {
        return 404;
    }
}
